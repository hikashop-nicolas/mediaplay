<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mediaplay demo</title>
    <style>
      html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; background: #111; color: #eee; }
      #app { display: flex; flex-direction: column; height: 100%; }
      header { padding: 8px 12px; border-bottom: 1px solid #333; display: flex; gap: 12px; align-items: center; background: #1a1a1f; }
      header b { font-size: 14px; }
      header label { font-size: 13px; color: #ccc; cursor: pointer; }
      #player { flex: 1 1 auto; min-height: 0; }
      #drop { height: 100%; display: flex; align-items: center; justify-content: center;
        color: #889; font-size: 15px; text-align: center; padding: 24px; }
    </style>
  </head>
  <body>
    <div id="app">
      <header>
        <b>mediaplay</b>
        <label>Open a file <input id="file" type="file" accept="audio/*,video/*,.mkv,.mka,.avi,.wmv,.flac,.opus" /></label>
        <span style="color:#778;font-size:12px">or drop one anywhere · nothing leaves your browser</span>
      </header>
      <div id="player"><div id="drop">Drop an audio or video file here (MP4, WebM, MKV, MP3, FLAC, …)</div></div>
    </div>
    <script type="module" src="./demo.ts"></script>
  </body>
</html>
